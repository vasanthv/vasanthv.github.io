<!DOCTYPE html>
<html lang="en">
	<head>
		<meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
		<meta http-equiv="Cache-control" content="public" />
		<meta
			name="viewport"
			content="width=device-width, height=device-height, initial-scale=1.0, maximum-scale=1.0, user-scalable=0"
		/>
		<title>Vasanth.V</title>
		<style>
			body {
				font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen-Sans,
					Ubuntu, Cantarell, 'Helvetica Neue', sans-serif;
				-webkit-font-smoothing: antialiased;
				-moz-osx-font-smoothing: grayscale;
				-webkit-text-size-adjust: 100%;
				margin: 0px;
			}
			#picWrap {
				margin: auto;
			}
		</style>
		<script src="https://cdn.jsdelivr.net/npm/vue"></script>
		<script src="matrix.js" type="text/javascript"></script>
	</head>
	<body>
		<div id="picWrap">
			<div id="pic">
				<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 188 188">
					<rect
						v-for="(item, i) in matrix"
						v-bind:key="i"
						v-bind:x="item.x"
						v-bind:y="item.y"
						width="1"
						height="1"
						v-bind:fill="item.color"
						v-bind:style=""
					/>
				</svg>
			</div>
		</div>
		<script type="text/javascript">
			const pic = new Vue({
				el: '#pic',
				data: {
					matrix: matrix
				},
				methods: {
					random: function() {
						const randomNumber = Math.floor(Math.random() * 100) + 0;
					}
				}
			});
		</script>
	</body>
</html>
